<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Рулетка - F1 Duel</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg1: #0E0F13;
      --bg2: #121624;
      --text: #fff;
      --text2: rgba(255,255,255,.68);
      --muted: rgba(255,255,255,.46);
      --accent: #8CFFC1;
      --accent-soft: rgba(140,255,193,.18);
      --glass-bg: rgba(255,255,255,.06);
      --glass-border: rgba(255,255,255,.10);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      overscroll-behavior: none;
    }

    body {
      background: linear-gradient(180deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding: 20px;
      padding-bottom: 100px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
    }

    .title {
      font-size: 32px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 8px;
      color: var(--accent);
    }

    .subtitle {
      text-align: center;
      color: var(--text2);
      font-size: 14px;
      margin-bottom: 24px;
    }

    .timer-section {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 20px;
      text-align: center;
      margin-bottom: 20px;
    }

    .timer {
      font-size: 48px;
      font-weight: 900;
      color: var(--accent);
      margin: 10px 0;
    }

    .timer.warning {
      color: #ff6b6b;
      animation: pulse 1s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .pot-info {
      display: flex;
      justify-content: space-around;
      margin-top: 16px;
    }

    .pot-item {
      text-align: center;
    }

    .pot-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pot-value {
      font-size: 20px;
      font-weight: 900;
      margin-top: 4px;
    }

    .multipliers {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .multiplier-card {
      background: var(--glass-bg);
      border: 2px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .multiplier-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .multiplier-card.selected {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .multiplier-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .multiplier-value {
      font-size: 24px;
      font-weight: 900;
      color: var(--accent);
    }

    .multiplier-players {
      font-size: 12px;
      color: var(--muted);
    }

    .multiplier-bets {
      max-height: 100px;
      overflow-y: auto;
    }

    .bet-item {
      display: flex;
      justify-content: space-between;
      padding: 6px 0;
      font-size: 13px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .bet-name {
      color: var(--text2);
    }

    .bet-amount {
      font-weight: 700;
      color: var(--text);
    }

    .bet-controls {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .bet-label {
      font-size: 12px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .bet-amounts {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
    }

    .bet-btn {
      padding: 10px;
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      background: var(--glass-bg);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .bet-btn:hover {
      border-color: var(--accent);
      background: var(--accent-soft);
    }

    .bet-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .place-bet-btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #8CFFC1, #4DFF9A);
      color: #07110c;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .place-bet-btn:hover {
      transform: scale(1.02);
    }

    .place-bet-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      text-align: center;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 20px;
      font-weight: 700;
    }

    .status.waiting {
      background: rgba(255, 193, 7, 0.1);
      border: 1px solid rgba(255, 193, 7, 0.3);
      color: #ffc107;
    }

    .status.active {
      background: rgba(76, 175, 80, 0.1);
      border: 1px solid rgba(76, 175, 80, 0.3);
      color: #4caf50;
    }

    .winner-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .winner-modal.show {
      display: flex;
    }

    .winner-content {
      background: var(--bg2);
      border: 2px solid var(--accent);
      border-radius: 24px;
      padding: 32px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .winner-title {
      font-size: 36px;
      font-weight: 900;
      color: var(--accent);
      margin-bottom: 16px;
    }

    .winner-name {
      font-size: 24px;
      margin-bottom: 8px;
    }

    .winner-payout {
      font-size: 32px;
      font-weight: 900;
      color: var(--accent);
      margin: 16px 0;
    }

    .close-btn {
      margin-top: 20px;
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      background: var(--glass-bg);
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title">🎰 РУЛЕТКА</h1>
    <p class="subtitle">Делай ставку и выигрывай весь банк!</p>

    <div id="status" class="status waiting">
      Ожидание игроков...
    </div>

    <div class="timer-section">
      <div class="pot-label">Таймер</div>
      <div id="timer" class="timer">--</div>
      <div class="pot-info">
        <div class="pot-item">
          <div class="pot-label">Банк</div>
          <div id="totalPot" class="pot-value">0 TON</div>
        </div>
        <div class="pot-item">
          <div class="pot-label">Игроков</div>
          <div id="totalPlayers" class="pot-value">0</div>
        </div>
      </div>
    </div>

    <div class="bet-controls">
      <div class="bet-label">Выбери сумму</div>
      <div class="bet-amounts">
        <button class="bet-btn" data-amount="0.25">0.25</button>
        <button class="bet-btn active" data-amount="0.5">0.5</button>
        <button class="bet-btn" data-amount="1">1</button>
        <button class="bet-btn" data-amount="5">MAX</button>
      </div>
      <button id="placeBetBtn" class="place-bet-btn">
        Поставить 0.5 TON
      </button>
    </div>

    <div class="multipliers" id="multipliers">
      <!-- Будет заполнено JS -->
    </div>
  </div>

  <div id="winnerModal" class="winner-modal">
    <div class="winner-content">
      <div class="winner-title">🎉 ПОБЕДИТЕЛЬ!</div>
      <div id="winnerName" class="winner-name">--</div>
      <div id="winnerPayout" class="winner-payout">0 TON</div>
      <div style="color: var(--text2); font-size: 14px;">
        Множитель: <span id="winnerMultiplier">--</span>
      </div>
      <button class="close-btn" onclick="closeWinnerModal()">Закрыть</button>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    let ws = null;
    let selectedMultiplier = 2;
    let selectedAmount = 0.5;
    let currentGameState = null;

    // WebSocket подключение
    function connectWebSocket() {
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      const host = window.location.host;
      ws = new WebSocket(`${protocol}//${host}/ws/roulette`);

      ws.onopen = () => {
        console.log('WebSocket connected');
        ws.send(JSON.stringify({ type: 'get_state' }));
      };

      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleWebSocketMessage(data);
      };

      ws.onclose = () => {
        console.log('WebSocket disconnected, reconnecting...');
        setTimeout(connectWebSocket, 3000);
      };

      ws.onerror = (error) => {
        console.error('WebSocket error:', error);
      };
    }

    // Обработка сообщений WebSocket
    function handleWebSocketMessage(data) {
      switch (data.type) {
        case 'game_state':
        case 'bet_placed':
          updateGameState(data.game);
          break;
        case 'timer_update':
          updateTimer(data.secondsRemaining);
          break;
        case 'timer_reset':
          updateTimer(data.secondsRemaining);
          break;
        case 'game_finished':
          showWinner(data.winner, data.totalPot);
          setTimeout(() => {
            ws.send(JSON.stringify({ type: 'get_state' }));
          }, 5000);
          break;
      }
    }

    // Обновление состояния игры
    function updateGameState(game) {
      currentGameState = game;
      
      document.getElementById('totalPot').textContent = `${Number(game.totalPot).toFixed(2)} TON`;
      document.getElementById('totalPlayers').textContent = game.totalPlayers;
      
      const statusEl = document.getElementById('status');
      if (game.status === 'waiting') {
        statusEl.className = 'status waiting';
        statusEl.textContent = 'Ожидание игроков...';
      } else if (game.status === 'active') {
        statusEl.className = 'status active';
        statusEl.textContent = 'Игра идёт!';
      }
      
      updateTimer(game.secondsRemaining);
      renderMultipliers(game.betsByMultiplier);
    }

    // Обновление таймера
    function updateTimer(seconds) {
      const timerEl = document.getElementById('timer');
      if (seconds === null || seconds === undefined) {
        timerEl.textContent = '--';
        timerEl.className = 'timer';
      } else {
        timerEl.textContent = seconds;
        timerEl.className = seconds <= 10 ? 'timer warning' : 'timer';
      }
    }

    // Отрисовка множителей
    function renderMultipliers(betsByMultiplier) {
      const container = document.getElementById('multipliers');
      container.innerHTML = '';
      
      const multipliers = [
        { value: 2, color: '#4caf50' },
        { value: 3, color: '#2196f3' },
        { value: 4, color: '#ff9800' },
        { value: 35, color: '#f44336' }
      ];
      
      multipliers.forEach(mult => {
        const bets = betsByMultiplier[mult.value] || [];
        const totalBet = bets.reduce((sum, b) => sum + Number(b.bet_amount), 0);
        
        const card = document.createElement('div');
        card.className = 'multiplier-card' + (selectedMultiplier === mult.value ? ' selected' : '');
        card.onclick = () => selectMultiplier(mult.value);
        
        card.innerHTML = `
          <div class="multiplier-header">
            <div class="multiplier-value" style="color: ${mult.color}">${mult.value}x</div>
            <div class="multiplier-players">${bets.length} игроков</div>
          </div>
          <div class="multiplier-bets">
            ${bets.map(bet => `
              <div class="bet-item">
                <span class="bet-name">${bet.player_name}</span>
                <span class="bet-amount">${Number(bet.bet_amount).toFixed(2)} TON</span>
              </div>
            `).join('')}
          </div>
          ${totalBet > 0 ? `<div style="margin-top: 8px; font-size: 12px; color: var(--muted);">Всего: ${totalBet.toFixed(2)} TON</div>` : ''}
        `;
        
        container.appendChild(card);
      });
    }

    // Выбор множителя
    function selectMultiplier(mult) {
      selectedMultiplier = mult;
      renderMultipliers(currentGameState?.betsByMultiplier || {});
    }

    // Выбор суммы ставки
    document.querySelectorAll('.bet-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedAmount = Number(btn.dataset.amount);
        document.getElementById('placeBetBtn').textContent = `Поставить ${selectedAmount} TON`;
      };
    });

    // Сделать ставку
    document.getElementById('placeBetBtn').onclick = async () => {
      if (!tg?.initData) {
        alert('Откройте игру через Telegram');
        return;
      }
      
      const btn = document.getElementById('placeBetBtn');
      btn.disabled = true;
      btn.textContent = 'Обработка...';
      
      try {
        const response = await fetch('/api/roulette/bet', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            initData: tg.initData,
            betAmount: selectedAmount,
            multiplier: selectedMultiplier
          })
        });
        
        const data = await response.json();
        
        if (data.ok) {
          console.log('Ставка принята:', data);
        } else {
          alert(data.error || 'Ошибка при ставке');
        }
      } catch (error) {
        console.error('Ошибка:', error);
        alert('Ошибка соединения');
      } finally {
        btn.disabled = false;
        btn.textContent = `Поставить ${selectedAmount} TON`;
      }
    };

    // Показать победителя
    function showWinner(winner, totalPot) {
      document.getElementById('winnerName').textContent = winner.name;
      document.getElementById('winnerPayout').textContent = `${Number(winner.payout).toFixed(2)} TON`;
      document.getElementById('winnerMultiplier').textContent = `${winner.multiplier}x`;
      document.getElementById('winnerModal').classList.add('show');
    }

    // Закрыть модалку победителя
    function closeWinnerModal() {
      document.getElementById('winnerModal').classList.remove('show');
    }

    // Инициализация
    connectWebSocket();
  </script>
</body>
</html>
